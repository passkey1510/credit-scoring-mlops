services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 7860 --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    ports:
      - "7860:7860"
    volumes:
      - logs:/app/logs
    depends_on:
      api:
        condition: service_healthy

volumes:
  logs:
