name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Prepare dashboard for HF Spaces
        run: |
          mkdir -p /tmp/hf-dashboard
          cp dashboard/app.py /tmp/hf-dashboard/app.py

          cat > /tmp/hf-dashboard/README.md << 'READMEEOF'
          ---
          title: Credit Scoring Dashboard
          emoji: 📊
          colorFrom: blue
          colorTo: green
          sdk: docker
          pinned: false
          ---
          # Credit Scoring — Monitoring Dashboard
          READMEEOF

          cat > /tmp/hf-dashboard/Dockerfile << 'DOCKEREOF'
          FROM python:3.11-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY app.py .
          EXPOSE 7860
          CMD ["streamlit", "run", "app.py", "--server.port", "7860", "--server.address", "0.0.0.0", "--server.headless", "true", "--browser.gatherUsageStats", "false"]
          DOCKEREOF

          cat > /tmp/hf-dashboard/requirements.txt << 'REQEOF'
          streamlit==1.41.1
          plotly==5.24.1
          pandas==2.2.3
          numpy>=1.23,<2.1
          requests
          REQEOF

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf-dashboard
          git init
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add -A
          git commit -m "Deploy dashboard to HuggingFace Spaces"
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/passkey1510/credit-scoring-dashboard
          git push hf main --force
